apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraudguard-serve
  namespace: fraudguard
  annotations:
    # For GKE Workload Identity — maps to GCP service account
    iam.gke.io/gcp-service-account: fraudguard-cicd@vizualflo-openclaw-prod.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fraudguard-serve-role
  namespace: fraudguard
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fraudguard-serve-binding
  namespace: fraudguard
subjects:
  - kind: ServiceAccount
    name: fraudguard-serve
    namespace: fraudguard
roleRef:
  kind: Role
  name: fraudguard-serve-role
  apiGroup: rbac.authorization.k8s.io
