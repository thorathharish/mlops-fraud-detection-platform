global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "fraudguard-serve"
    static_configs:
      # host.docker.internal resolves to the Windows host from inside Docker Desktop
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
