apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-stable
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-serve
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  type: {{ .Values.service.type }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-canary
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-serve
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  type: {{ .Values.service.type }}
