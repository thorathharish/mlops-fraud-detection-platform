name: CI — Lint + Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install ruff pytest pytest-asyncio httpx xgboost scikit-learn mlflow pandas numpy fastapi starlette pydantic prometheus-client

      - name: Lint
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
